suite:
  out_dir: "results"
  reports_dir: "reports/analysis/suite/latest"
  pick_latest_n_jsonl: 50

tasks:
  - task_type: "llm_decode"
    enabled: true
    models:
      - model_id: "openai-community/gpt2"
        model_alias: "gpt2"
      - model_id: "Qwen/Qwen2.5-7B-Instruct"
        model_alias: "qwen25_7b"
        allow_weight_quant: true
        weight_quant_mode: "int4"
    sweep:
      context_len_start: 64
      context_len_max: 1024
      doubling_steps: 5
      gen_tokens: 16
      batch_size: 1
      runs: 5
      warmup: 1
      seed: 1337
    compute_units:
      whole: ["CPU_AND_NE", "ALL"]
      split:
        - {prefill: "CPU_AND_NE", decode: "CPU_AND_GPU"}

  - task_type: "diffusion_sd15"
    enabled: true
    model_alias: "sd15"
    byop_coreml_dir: "assets/sd15_coreml"
    convert_if_missing: true
    sweep:
      steps_list: [10, 20, 30, 50]
      image_size: 512
      runs: 3
      warmup: 1
      seed: 1337
    compute_units:
      stages:
        - {text_encoder: "CPU_AND_NE", unet: "CPU_AND_GPU", vae: "CPU_AND_GPU"}
        - {text_encoder: "CPU_AND_GPU", unet: "CPU_AND_NE", vae: "CPU_AND_GPU"}
        - {text_encoder: "ALL",        unet: "ALL",        vae: "ALL"}
        - {text_encoder: "CPU_ONLY",   unet: "CPU_ONLY",   vae: "CPU_ONLY"}

  - task_type: "speech_owsm"
    enabled: true
    model_tag: "espnet/owsm_v3.1_ebf_small"
    model_alias: "owsm_v31_small"
    sweep:
      audio_seconds_list: [5, 10, 20, 40]
      sample_rate: 16000
      runs: 3
      warmup: 1
      seed: 1337
    compute_units:
      backends: ["CPU_ONLY", "MPS"]
